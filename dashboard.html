<!DOCTYPE html>
<html lang="id">

<head>

    <link rel="stylesheet" href="assets/css/dashboard.css">

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Dashboard | MLBB Event Tracker</title>

    <link rel="stylesheet"
        href="assets/css/style.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link rel="preconnect"
        href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

</head>

<body>
    
<div class="sidebar">

<div class="logo">

<h2>MLBB</h2>

<p>Event Tracker</p>

</div>

<div class="menu">

<a href="dashboard.html">🏠 Dashboard</a>

<a href="planner.html">📅 Planner</a>

<a href="diamond.html">💎 Diamond</a>

<a href="crest.html">🏅 Crest</a>

<a href="#">🎟 Spin History</a>

<a href="#">🪙 CoA</a>

<a href="#">💰 Budget</a>

<a href="settings.html">⚙️ Settings</a>

</div>

</div>
    
<div class="main">
<div class="container py-4">

    <h1 class="text-center mb-4">
        💎 MLBB EVENT TRACKER
    </h1>

    <p class="text-center text-light">
        Street Fighter Edition
    </p>

    <!-- STATUS -->

    <div class="row g-3">

        <div class="col-6">

            <div class="status-card">

                <h5>💎 Diamond</h5>

                <h2 id="diamond">
                    487
                </h2>

            </div>

        </div>

        <div class="col-6">

            <div class="status-card">

                <h5>🏅 Crest</h5>

                <h2 id="crest">
                    49
                </h2>

            </div>

        </div>

        <div class="col-6">

            <div class="status-card">

                <h5>🎟 Token Spin</h5>

                <h2 id="token">
                    0
                </h2>

            </div>

        </div>

        <div class="col-6">

            <div class="status-card">

                <h5>🪙 CoA</h5>

                <h2 id="coa">
                    0
                </h2>

            </div>

        </div>

    </div>

    <!-- PROGRESS -->

    <div class="glass mt-4">

        <h4>

            🎯 Progress Chun-Li

        </h4>

        <h2>

            <span id="crestNow">
                49
            </span>

            /

            1200

        </h2>

        <div class="progress">

            <div
                class="progress-bar"

                id="progress"

                style="width:4%">
            </div>

        </div>

    </div>

    <!-- MENU -->

    <div class="row g-3 mt-3">

        <div class="col-6">

            <button
            onclick="location.href='planner.html'">

                📅 Planner

            </button>

        </div>

        <div class="col-6">

            <button
            onclick="location.href='diamond.html'">

                💎 Diamond

            </button>

        </div>

        <div class="col-6">

            <button
            onclick="location.href='crest.html'">

                🏅 Crest

            </button>

        </div>

        <div class="col-6">

            <button
            onclick="location.href='settings.html'">

                ⚙ Settings

            </button>

        </div>

    </div>

    <!-- BUDGET -->

    <div class="glass mt-4">

        <h4>

            💰 Budget

        </h4>

        <p>

            Total Top Up

        </p>

        <h2>

            Rp165.030

        </h2>

    </div>

    <!-- COUNTDOWN -->

    <div class="glass mt-4">

        <h4>

            ⏳ Event Countdown

        </h4>

        <h2 id="countdown">

            ...

        </h2>

    </div>

</div>

</div>
    
<script src="assets/js/app.js"></script>

</body>

</html>
